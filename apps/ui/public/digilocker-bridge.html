<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiLocker Authentication Bridge</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      max-width: 520px;
    }
    .code {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      word-break: break-all;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ DigiLocker Authentication Successful</h1>
    <p id="status">Processing authorization code...</p>
    <div id="code" class="code" hidden></div>
  </div>
  <script>
    function extractCode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('code');
    }

    function post(code) {
      const redirectMessage = {
        type: 'DIGILOCKER_REDIRECT',
        code,
        timestamp: Date.now(),
      };
      const doneMessage = {
        type: 'DIGILOCKER_DONE',
        finalUrl: window.location.href,
        timestamp: Date.now(),
      };

      if (window.opener) {
        window.opener.postMessage(redirectMessage, '*');
        window.opener.postMessage(doneMessage, '*');
      }
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(redirectMessage, '*');
        window.parent.postMessage(doneMessage, '*');
      }
    }

    const code = extractCode();
    if (code) {
      document.getElementById('status').textContent = 'Authorization code detected and sent to the application.';
      const codeElement = document.getElementById('code');
      codeElement.hidden = false;
      codeElement.textContent = code;
      post(code);
      const interval = setInterval(() => post(code), 2000);
      setTimeout(() => clearInterval(interval), 30000);
      setTimeout(() => {
        if (window.opener) {
          window.close();
        }
      }, 3000);
    } else {
      document.getElementById('status').textContent = 'No authorization code found in URL.';
    }
  </script>
</body>
</html>
